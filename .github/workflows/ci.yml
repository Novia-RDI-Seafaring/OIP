name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: packages/oip
        run: uv sync --extra dev

      - name: Run tests
        working-directory: packages/oip
        run: uv run pytest -v

      - name: Build wheel
        working-directory: packages/oip
        run: uv build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: oip-wheel
          path: packages/oip/dist/*.whl

  validate-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON Schemas are valid JSON Schema
        run: |
          python -c "
          import json
          from pathlib import Path
          for f in Path('schemas').glob('*.json'):
              data = json.loads(f.read_text())
              assert '\$schema' in data, f'{f} missing \$schema'
              assert 'title' in data, f'{f} missing title'
              print(f'{f.name} ✓')
          "

  validate-example:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install oip
        working-directory: packages/oip
        run: uv sync --extra dev

      - name: Materialize the worked example onto disk and validate it
        working-directory: packages/oip
        run: |
          uv run python -c "
          import json
          from pathlib import Path
          example = json.loads(Path('../../examples/transcriber.json').read_text())
          out = Path('/tmp/oip-example')
          for rel, body in example['files'].items():
              full = out / rel
              full.parent.mkdir(parents=True, exist_ok=True)
              full.write_text(json.dumps(body, indent=2))
          print('materialized at', out)
          "
          uv run oip validate /tmp/oip-example
