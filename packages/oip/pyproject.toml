[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "oip"
version = "0.1.0"
description = "Open Ingestion Protocol — spec, schemas, validators, and starter code for agents implementing OIP-compliant producers."
requires-python = ">=3.10"
authors = [{name = "OIP contributors"}]
readme = "README.md"
license = {text = "MIT OR Apache-2.0"}
keywords = ["oip", "ingestion", "agents", "mcp", "anchor"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "typer>=0.12",
    "jsonschema>=4.21",
]

[project.urls]
Homepage = "https://github.com/Novia-RDI-Seafaring/OIP"
Documentation = "https://github.com/Novia-RDI-Seafaring/OIP/blob/main/SPEC.md"
Repository = "https://github.com/Novia-RDI-Seafaring/OIP"
Issues = "https://github.com/Novia-RDI-Seafaring/OIP/issues"
Changelog = "https://github.com/Novia-RDI-Seafaring/OIP/blob/main/CHANGELOG.md"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]

[project.scripts]
oip = "oip.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/oip"]

[tool.pytest.ini_options]
testpaths = ["tests"]
